<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratel Observatory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #060608; color: #e1e1e6; overflow: hidden; display: flex; flex-direction: column; }
.mono { font-family: 'JetBrains Mono', monospace; }
:root {
  --bg: #060608; --bg1: #0a0a0d; --bg2: #111116; --bg3: #16161c;
  --border: #1a1a20; --border2: #222228; --border3: #2a2a32;
  --text: #e1e1e6; --text-dim: #8e8e93; --text-dim2: #6c6c74;
  --accent: #c586c0; --accent2: #7ee787; --warn: #d29922; --err: #f85149; --info: #58a6ff;
}

/* ── Top bar ── */
#top-bar { background: rgba(18,18,22,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; gap: 16px; }
.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.brand-logo span { background: #fff; color: #060608; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
#summary-strip { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; font-size: 12px; flex-wrap: wrap; }
.ss-chip { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border2); padding: 5px 10px; border-radius: 6px; white-space: nowrap; }
.ss-label { color: var(--text-dim); text-transform: uppercase; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
.ss-value { color: #fff; font-weight: 600; }
.ss-value.phase { color: var(--accent); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim2); display: inline-block; }
.status-dot.active { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 2s infinite; }
.status-dot.halted { background: var(--err); box-shadow: 0 0 8px var(--err); }
.status-dot.completed { background: var(--info); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
#mode-badge { font-size: 10px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

/* ── Tab bar ── */
#tab-bar { display: flex; gap: 0; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 12px; align-items: center; }
.tab { padding: 10px 18px; cursor: pointer; font-size: 13px; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.tab:hover { color: var(--text); }
.tab.active { color: #fff; border-bottom-color: var(--accent); }
.tab .badge { background: var(--err); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
.tab .badge.warn { background: var(--warn); }
.tab .badge.info { background: var(--info); }
#tab-files { margin-left: auto; color: var(--text-dim2); }
#tab-files.active { color: var(--text-dim); }

/* ── Content ── */
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab-pane { display: none; flex: 1; overflow: auto; padding: 16px; }
.tab-pane.active { display: flex; flex-direction: column; gap: 14px; }

/* ── Cards ── */
.card { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.card-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 14px; font-size: 12px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.card-body { padding: 14px; }

/* ── Live: split layout (agent tree left, activity feed right) ── */
#live-split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; flex: 1; overflow: hidden; min-height: 0; }
#live-split > .card { display: flex; flex-direction: column; overflow: hidden; }
#live-split > .card > .card-body { flex: 1; overflow-y: auto; }

/* ── Agent tree (#2) ── */
#agent-tree { font-size: 13px; line-height: 1.8; }
.tree-node { padding-left: 20px; }
.tree-node-root { padding-left: 0; }
.tree-node-label { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 4px; cursor: default; transition: background 0.1s; }
.tree-node-label:hover { background: var(--bg2); }
.tree-node-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text-dim2); }
.tree-node-dot.running { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); animation: glow 1.5s infinite; }
.tree-node-dot.failed { background: var(--err); box-shadow: 0 0 8px var(--err); }
.tree-node-dot.idle { background: var(--text-dim2); }
.tree-node-dot.waiting { background: var(--warn); }
@keyframes glow { 0%,100% { box-shadow: 0 0 4px var(--accent2); } 50% { box-shadow: 0 0 14px var(--accent2); } }
.tree-node-role { font-weight: 600; color: var(--text); }
.tree-node-role.root { color: var(--accent); font-size: 14px; }
.tree-node-meta { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.tree-node-children { margin-left: 14px; border-left: 1px solid var(--border2); padding-left: 8px; }

/* ── Activity feed (#3) ── */
#activity-feed { font-size: 13px; line-height: 1.6; }
.activity-row { display: flex; gap: 8px; padding: 4px 6px; border-bottom: 1px solid var(--border); }
.activity-time { color: var(--text-dim2); flex-shrink: 0; width: 60px; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding-top: 2px; }
.activity-cat { flex-shrink: 0; width: 70px; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; padding-top: 3px; }
.activity-cat.agent { color: var(--info); }
.activity-cat.file { color: var(--accent2); }
.activity-cat.validation { color: var(--warn); }
.activity-cat.phase { color: var(--accent); }
.activity-cat.decision { color: var(--accent); }
.activity-cat.halt { color: var(--err); }
.activity-cat.budget { color: var(--err); }
.activity-cat.question { color: var(--info); }
.activity-cat.approval { color: var(--accent2); }
.activity-text { color: var(--text); flex: 1; }

/* ── Halt banner ── */
#halt-banner { background: rgba(248,81,73,0.1); border: 1px solid var(--err); border-radius: 6px; padding: 10px 14px; color: var(--err); font-size: 13px; display: none; }
#halt-banner.show { display: block; }

/* ── Plan tab: one scrollable document ── */
#plan-doc { max-width: 900px; margin: 0 auto; width: 100%; }
.plan-section { margin-bottom: 20px; }
.plan-section-header { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.plan-context { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 14px; font-size: 13px; }
.plan-context-row { display: flex; gap: 10px; margin-bottom: 4px; }
.plan-context-label { color: var(--text-dim); font-weight: 600; min-width: 120px; }
.plan-context-value { color: var(--text); }
.plan-assertion { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.plan-assertion-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent2); font-weight: 700; }
.plan-assertion-title { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 4px; }
.plan-assertion-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
.plan-assertion-criteria { font-size: 12px; color: var(--text); margin-top: 4px; }
.plan-feature { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.plan-feature-title { font-weight: 600; font-size: 13px; }
.plan-feature-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
.plan-feature-status { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; }
.plan-feature-status.pending { background: var(--bg3); color: var(--text-dim); }
.plan-feature-status.in_progress { background: rgba(88,166,255,0.15); color: var(--info); }
.plan-feature-status.integrated { background: rgba(126,231,135,0.15); color: var(--accent2); }
.plan-feature-status.validated { background: rgba(126,231,135,0.25); color: var(--accent2); }
.plan-feature-status.blocked { background: rgba(248,81,73,0.15); color: var(--err); }
.plan-milestone { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.plan-milestone-progress { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

/* ── Approval bar ── */
#approval-bar { position: sticky; bottom: 0; background: var(--bg1); border-top: 1px solid var(--border2); padding: 14px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
#approval-bar .approval-hint { font-size: 11px; color: var(--text-dim); flex: 1; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--bg3); border-color: var(--border3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.primary { background: var(--accent2); color: #000; border-color: var(--accent2); font-weight: 600; }
.btn.primary:hover { opacity: 0.9; }
.btn.danger { background: var(--err); color: #fff; border-color: var(--err); font-weight: 600; }
.btn.ghost { background: transparent; }

/* ── Edit draft mode ── */
.edit-toggle { font-size: 12px; color: var(--text-dim); cursor: pointer; text-decoration: underline; }
.edit-toggle:hover { color: var(--text); }
#edit-panel { display: none; background: var(--bg2); border: 1px solid var(--border3); border-radius: 6px; padding: 12px; margin-bottom: 10px; }
#edit-panel.show { display: block; }
#edit-panel textarea { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 5px; padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; min-height: 120px; resize: vertical; }
.edit-field { margin-bottom: 8px; }
.edit-field label { font-size: 11px; color: var(--text-dim); font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }

/* ── Files tab ── */
#files-layout { display: grid; grid-template-columns: 280px 1fr; gap: 14px; flex: 1; overflow: hidden; min-height: 0; }
#files-tree-panel { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
#files-tree-panel .card-header { border-bottom: 1px solid var(--border); }
#files-tree { flex: 1; overflow-y: auto; padding: 6px 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.f-tree-row { display: flex; align-items: center; gap: 4px; padding: 3px 12px; cursor: pointer; white-space: nowrap; transition: background 0.1s; }
.f-tree-row:hover { background: var(--bg2); }
.f-tree-row.selected { background: var(--bg3); color: var(--accent); }
.f-tree-icon { width: 14px; text-align: center; flex-shrink: 0; color: var(--text-dim2); }
.f-tree-icon.dir { color: var(--accent); }
.f-tree-icon.file { color: var(--text-dim); }
.f-tree-name { overflow: hidden; text-overflow: ellipsis; }
.f-tree-lock { font-size: 9px; color: var(--warn); margin-left: auto; padding-right: 4px; }

#files-editor-panel { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
#files-editor-header { border-bottom: 1px solid var(--border); padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; }
#files-editor-body { flex: 1; overflow-y: auto; padding: 14px; }
#files-editor-body pre { font-family: 'JetBrains Mono', monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
#files-editor-body textarea { width: 100%; min-height: 300px; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 5px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; resize: vertical; }
#files-editor-actions { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }

/* ── Empty / placeholder ── */
.empty { color: var(--text-dim2); font-size: 13px; padding: 20px; text-align: center; font-style: italic; }

/* ── Toast ── */
#toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border3); border-radius: 6px; padding: 12px 16px; font-size: 13px; max-width: 400px; z-index: 300; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
#toast.show { display: block; }
#toast.err { border-color: var(--err); }
#toast.ok { border-color: var(--accent2); }

/* ── Modal ── */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 200; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal { background: var(--bg1); border: 1px solid var(--border2); border-radius: 10px; max-width: 800px; width: 90%; max-height: 85vh; overflow: auto; display: flex; flex-direction: column; }
#modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
#modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
#modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }
#modal-close:hover { color: var(--err); }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div id="top-bar">
  <div class="brand"><div class="brand-logo">🛰️ <span>Ratel</span></div></div>
  <div id="summary-strip"></div>
  <div id="mode-badge" title="Action mode">none</div>
</div>

<!-- ── Tab bar ── -->
<div id="tab-bar">
  <div class="tab active" data-tab="live">Live</div>
  <div class="tab" data-tab="plan">Plan</div>
  <div class="tab" id="tab-files" data-tab="files">Files</div>
</div>

<!-- ── Content ── -->
<div id="content">

  <!-- ═══ Live ═══ -->
  <div class="tab-pane active" data-pane="live">
    <div id="halt-banner"></div>
    <div id="live-split">
      <div class="card">
        <div class="card-header"><span>Agent Tree</span><span class="mono" id="tree-summary"></span></div>
        <div class="card-body" id="agent-tree"><div class="empty">No mission</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span>Activity</span><span class="mono" id="activity-count">0</span></div>
        <div class="card-body" id="activity-feed"><div class="empty">No activity yet</div></div>
      </div>
    </div>
  </div>

  <!-- ═══ Plan ═══ -->
  <div class="tab-pane" data-pane="plan">
    <div id="plan-doc">
      <div class="plan-section">
        <div class="plan-section-header">Context</div>
        <div class="plan-context" id="plan-context"><div class="empty">No mission loaded</div></div>
      </div>
      <div class="plan-section">
        <div class="plan-section-header">Validation Contract</div>
        <div id="plan-contract"><div class="empty">No contract yet</div></div>
      </div>
      <div class="plan-section">
        <div class="plan-section-header">Features</div>
        <div id="plan-features"><div class="empty">No features yet</div></div>
      </div>
      <div class="plan-section">
        <div class="plan-section-header">Milestones</div>
        <div id="plan-milestones"><div class="empty">No milestones yet</div></div>
      </div>
    </div>
    <div id="approval-bar">
      <div class="approval-hint" id="approval-hint"></div>
      <span class="edit-toggle" id="edit-toggle">Edit draft</span>
      <div id="edit-panel">
        <div class="edit-field"><label>Validation contract (markdown)</label><textarea id="edit-contract-md" rows="8"></textarea></div>
        <div class="edit-field"><label>Feedback / reason for edits</label><textarea id="edit-feedback" rows="2" placeholder="What should change..."></textarea></div>
      </div>
      <button class="btn primary" id="btn-approve" disabled>Approve & Start</button>
      <button class="btn danger" id="btn-request-changes" disabled>Request Changes</button>
    </div>
  </div>

  <!-- ═══ Files ═══ -->
  <div class="tab-pane" data-pane="files">
    <div id="files-layout">
      <div id="files-tree-panel">
        <div class="card-header"><span>Workspace</span><span class="mono" id="files-count">0</span></div>
        <div id="files-tree"></div>
      </div>
      <div id="files-editor-panel">
        <div id="files-editor-header"><span id="files-path">Select a file</span><span id="files-lock"></span></div>
        <div id="files-editor-body"><div class="empty">Pick a file from the tree</div></div>
        <div id="files-editor-actions">
          <button class="btn" id="btn-edit-file">Edit</button>
          <button class="btn primary" id="btn-save-file" style="display:none">Save</button>
          <button class="btn ghost" id="btn-cancel-edit" style="display:none">Cancel</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ── Modal ── -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header"><span id="modal-title">Detail</span><button id="modal-close">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
"use strict";

// ═══ State ═══
const state = {
  missionId: null,
  activeTab: "live",
  status: null,
  artifacts: null,
  agentTree: null,
  activity: [],
  activityTotal: 0,
  actionsAvailable: false,
  mode: "none",
  editingFile: false,
  currentFile: { path: "", content: "", editable: false },
};

const $ = (id) => document.getElementById(id);
const $$ = (sel) => document.querySelectorAll(sel);

// ═══ API ═══
function withMissionId(path) {
  if (!state.missionId) return path;
  const sep = path.includes("?") ? "&" : "?";
  return `${path}${sep}missionId=${encodeURIComponent(state.missionId)}`;
}
async function apiGet(path) { const r = await fetch(withMissionId(path)); if (!r.ok) throw new Error(`${path} → ${r.status}`); return r.json(); }
async function apiPost(path, body) {
  const payload = { ...body }; if (state.missionId) payload.missionId = state.missionId;
  const r = await fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
  const text = await r.text(); let data; try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
  if (!r.ok) throw new Error(`${path} → ${r.status}: ${data.error || data.message || text}`);
  return data;
}
function toast(msg, kind) { const t = $("toast"); t.textContent = msg; t.className = "show " + (kind || ""); setTimeout(() => { t.className = ""; }, 4000); }
function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function fmtTime(iso) { try { return new Date(iso).toTimeString().slice(0, 8); } catch { return "--:--:--"; } }
function fmtDate(iso) { try { return new Date(iso).toLocaleString(); } catch { return iso; } }

// ═══ Tabs ═══
function setTab(tab) {
  state.activeTab = tab;
  $$(".tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === tab));
  $$(".tab-pane").forEach((p) => p.classList.toggle("active", p.dataset.pane === tab));
  if (tab === "live") renderLive();
  if (tab === "plan") renderPlan();
  if (tab === "files") renderFiles();
}

// ═══ Summary strip (top bar) ═══
function renderSummaryStrip(s) {
  if (!s) { $("summary-strip").innerHTML = '<span class="ss-chip"><span class="ss-label">No mission</span></span>'; return; }
  const dot = s.status === "active" ? "active" : s.status === "halted" ? "halted" : s.status === "completed" ? "completed" : "";
  const chips = [
    `<span class="ss-chip"><span class="ss-label">Mission</span><span class="ss-value mono">${escapeHtml(s.missionId?.slice(0, 16) ?? "—")}</span></span>`,
    `<span class="ss-chip"><span class="ss-label">Phase</span><span class="ss-value phase">${escapeHtml(s.phase)}</span></span>`,
    `<span class="ss-chip"><span class="status-dot ${dot}"></span><span class="ss-value">${escapeHtml(s.status)}</span></span>`,
  ];
  if (s.budget) {
    const pct = s.budget.limits.maxCostUsd ? Math.round((s.budget.used.costUsd / s.budget.limits.maxCostUsd) * 100) : 0;
    chips.push(`<span class="ss-chip"><span class="ss-label">Budget</span><span class="ss-value">${pct}%</span></span>`);
  }
  const running = s.agents?.filter((a) => a.state === "running").length ?? 0;
  const failed = s.agents?.filter((a) => a.state === "failed").length ?? 0;
  if (running > 0) chips.push(`<span class="ss-chip"><span class="ss-label">Active</span><span class="ss-value">${running}</span></span>`);
  if (failed > 0) chips.push(`<span class="ss-chip"><span class="ss-label">Failed</span><span class="ss-value" style="color:var(--err)">${failed}</span></span>`);
  if (s.pendingQuestion) chips.push(`<span class="ss-chip"><span class="ss-label">Pending</span><span class="ss-value" style="color:var(--info)">question</span></span>`);
  $("summary-strip").innerHTML = chips.join("");
  $("mode-badge").textContent = s.mode;
  $("mode-badge").title = s.actionsAvailable ? "Actions available" : "Actions unavailable — edits save to disk only";
}

// ═══ Live tab ═══
async function renderLive() {
  let snap;
  try { snap = await apiGet("/api/status"); } catch (e) { toast("status: " + e.message, "err"); return; }
  state.status = snap;
  state.missionId = snap.missionId;
  state.actionsAvailable = snap.actionsAvailable;
  state.mode = snap.mode;
  renderSummaryStrip(snap);

  // Halt banner
  const hb = $("halt-banner");
  if (snap.haltReason) { hb.textContent = "Halted: " + snap.haltReason; hb.className = "show"; }
  else { hb.className = ""; }

  // Agent tree
  try {
    const tr = await apiGet("/api/agent-tree");
    state.agentTree = tr.tree;
    renderAgentTree(tr.tree);
  } catch (e) { $("agent-tree").innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }

  // Activity feed
  try {
    const feed = await apiGet("/api/activity?limit=80");
    state.activity = feed.entries;
    state.activityTotal = feed.total;
    renderActivityFeed(feed.entries);
  } catch (e) { $("activity-feed").innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
}

function renderAgentTree(tree) {
  if (!tree) { $("agent-tree").innerHTML = '<div class="empty">No agents</div>'; return; }
  const running = countRunning(tree);
  const total = countNodes(tree);
  $("tree-summary").textContent = `${total} nodes · ${running} running`;
  $("agent-tree").innerHTML = renderTreeNode(tree, true);
}

function countNodes(node) {
  let n = 1;
  for (const c of node.children || []) n += countNodes(c);
  return n;
}
function countRunning(node) {
  let n = node.state === "running" ? 1 : 0;
  for (const c of node.children || []) n += countRunning(c);
  return n;
}

function renderTreeNode(node, isRoot) {
  const dotCls = `tree-node-dot ${node.state}`;
  const meta = [node.model, node.featureId, node.milestoneId].filter(Boolean).map(escapeHtml).join(" · ");
  let html = `<div class="tree-node ${isRoot ? "tree-node-root" : ""}">
    <div class="tree-node-label">
      <span class="${dotCls}"></span>
      <span class="tree-node-role ${isRoot ? "root" : ""}">${escapeHtml(node.label)}</span>
      ${meta ? `<span class="tree-node-meta">${meta}</span>` : ""}
    </div>`;
  if (node.children && node.children.length > 0) {
    html += `<div class="tree-node-children">`;
    for (const child of node.children) html += renderTreeNode(child, false);
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderActivityFeed(entries) {
  if (!entries.length) { $("activity-feed").innerHTML = '<div class="empty">No activity yet</div>'; return; }
  $("activity-count").textContent = `${state.activityTotal} total`;
  // Reverse so newest is at top
  const reversed = [...entries].reverse();
  $("activity-feed").innerHTML = reversed.map((e) =>
    `<div class="activity-row">
      <span class="activity-time">${fmtTime(e.timestamp)}</span>
      <span class="activity-cat ${e.category}">${escapeHtml(e.category)}</span>
      <span class="activity-text">${escapeHtml(e.text)}</span>
    </div>`).join("");
}

// ═══ Plan tab ═══
async function renderPlan() {
  // Status for approval bar
  let snap;
  try { snap = await apiGet("/api/status"); } catch { snap = state.status; }
  state.status = snap;
  state.missionId = snap?.missionId ?? state.missionId;
  state.actionsAvailable = snap?.actionsAvailable ?? false;

  // Approval bar
  const hint = $("approval-hint");
  const isApprovalPhase = snap?.phase === "user_approval";
  if (state.actionsAvailable) {
    hint.textContent = isApprovalPhase ? "Review the plan, then approve to start the factory." : `Phase: ${snap?.phase} — plan is historical reference.`;
  } else {
    hint.textContent = `Mode: ${snap?.mode ?? "none"} — edits save to disk. ${isApprovalPhase ? "Approve/reject unavailable (no action bridge)." : ""}`;
  }
  $("btn-approve").disabled = !state.actionsAvailable || !isApprovalPhase;
  $("btn-request-changes").disabled = !state.actionsAvailable || !isApprovalPhase;

  // Load artifacts
  try {
    state.artifacts = await apiGet("/api/artifacts");
  } catch (e) { toast("artifacts: " + e.message, "err"); return; }
  renderPlanContext();
  renderPlanContract();
  renderPlanFeatures();
  renderPlanMilestones();
}

function renderPlanContext() {
  const a = state.artifacts;
  const r = a?.requirements;
  const el = $("plan-context");
  if (!r) { el.innerHTML = '<div class="empty">No requirements yet</div>'; return; }
  el.innerHTML = `
    <div class="plan-context-row"><span class="plan-context-label">Goal</span><span class="plan-context-value">${escapeHtml(r.goal)}</span></div>
    <div class="plan-context-row"><span class="plan-context-label">Product intent</span><span class="plan-context-value">${escapeHtml(r.productIntent)}</span></div>
    ${r.nonGoals?.length ? `<div class="plan-context-row"><span class="plan-context-label">Non-goals</span><span class="plan-context-value">${r.nonGoals.map((g) => escapeHtml(g)).join(", ")}</span></div>` : ""}
    <div class="plan-context-row"><span class="plan-context-label">Risk</span><span class="plan-context-value">${escapeHtml(r.riskTolerance)}</span></div>
    ${r.deadlines ? `<div class="plan-context-row"><span class="plan-context-label">Deadlines</span><span class="plan-context-value">${escapeHtml(r.deadlines)}</span></div>` : ""}
    ${a.constraints ? `<div class="plan-context-row"><span class="plan-context-label">Constraints</span><span class="plan-context-value" style="font-size:12px;color:var(--text-dim)">${escapeHtml(a.constraints.slice(0, 200))}${a.constraints.length > 200 ? "…" : ""}</span></div>` : ""}
  `;
}

function renderPlanContract() {
  const c = state.artifacts?.contractJson;
  const el = $("plan-contract");
  if (!c) { el.innerHTML = '<div class="empty">No validation contract yet</div>'; return; }
  el.innerHTML = `
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">v${c.version} · ${c.assertions?.length ?? 0} assertions${c.gaps?.length ? ` · ${c.gaps.length} gaps` : ""}</div>
    ${(c.assertions || []).map((a) =>
      `<div class="plan-assertion">
        <div class="plan-assertion-id">${escapeHtml(a.id)}</div>
        <div class="plan-assertion-title">${escapeHtml(a.title)}</div>
        <div class="plan-assertion-meta">${escapeHtml(a.featureFile)} · ${escapeHtml(a.scenario)} · evidence: ${escapeHtml(a.evidenceType)}</div>
        <div class="plan-assertion-criteria">${escapeHtml(a.successCriteria)}</div>
      </div>`).join("")}
    ${c.gaps?.length ? `<div style="margin-top:10px"><b>Gaps:</b><ul style="margin-left:20px;font-size:13px">${c.gaps.map((g) => `<li>${escapeHtml(g)}</li>`).join("")}</ul></div>` : ""}
    ${c.crossCuttingAssertions?.length ? `<div style="margin-top:10px"><b>Cross-cutting:</b><ul style="margin-left:20px;font-size:13px">${c.crossCuttingAssertions.map((g) => `<li>${escapeHtml(g)}</li>`).join("")}</ul></div>` : ""}
  `;
}

function renderPlanFeatures() {
  const features = state.artifacts?.features || [];
  const el = $("plan-features");
  if (!features.length) { el.innerHTML = '<div class="empty">No features yet</div>'; return; }
  el.innerHTML = features.map((f) =>
    `<div class="plan-feature">
      <div>
        <div class="plan-feature-title">${escapeHtml(f.title)}</div>
        <div class="plan-feature-meta">${escapeHtml(f.id)} · ${escapeHtml(f.milestoneId)}${f.commitSha ? " · " + escapeHtml(f.commitSha.slice(0, 7)) : ""}</div>
      </div>
      <span class="plan-feature-status ${f.status}">${escapeHtml(f.status)}</span>
    </div>`).join("");
}

function renderPlanMilestones() {
  const milestones = state.artifacts?.milestones || [];
  const features = state.artifacts?.features || [];
  const el = $("plan-milestones");
  if (!milestones.length) { el.innerHTML = '<div class="empty">No milestones yet</div>'; return; }
  el.innerHTML = milestones.map((m) => {
    const fs = features.filter((f) => f.milestoneId === m.id);
    const done = fs.filter((f) => f.status === "integrated" || f.status === "validated").length;
    return `<div class="plan-milestone">
      <div>
        <div class="plan-feature-title">${escapeHtml(m.title)}</div>
        <div class="plan-feature-meta">${escapeHtml(m.id)} · ${escapeHtml(m.description)}</div>
      </div>
      <span class="plan-milestone-progress">${done}/${fs.length}</span>
    </div>`;
  }).join("");
}

// ═══ Plan: approval actions ═══
$("edit-toggle").addEventListener("click", () => {
  const panel = $("edit-panel");
  const showing = panel.classList.toggle("show");
  if (showing && state.artifacts?.contractMd) {
    $("edit-contract-md").value = state.artifacts.contractMd;
  }
});

$("btn-approve").addEventListener("click", async () => {
  const panel = $("edit-panel");
  const hasEdits = panel.classList.contains("show") && $("edit-contract-md").value.trim();
  try {
    let r;
    if (hasEdits) {
      r = await apiPost("/api/approve-with-edits", { edits: { "validation-contract.md": $("edit-contract-md").value }, feedback: $("edit-feedback").value || undefined });
    } else {
      r = await apiPost("/api/approve", {});
    }
    toast(r.ok ? "Approved — factory starting" : (r.message || "Failed"), r.ok ? "ok" : "err");
    panel.classList.remove("show");
  } catch (e) { toast(e.message, "err"); }
});

$("btn-request-changes").addEventListener("click", async () => {
  const panel = $("edit-panel");
  const hasEdits = panel.classList.contains("show") && $("edit-contract-md").value.trim();
  try {
    let r;
    if (hasEdits) {
      r = await apiPost("/api/request-changes", { edits: { "validation-contract.md": $("edit-contract-md").value }, feedback: $("edit-feedback").value || undefined });
    } else {
      const feedback = prompt("What should change?");
      if (feedback === null) return;
      r = await apiPost("/api/reject", { feedback });
    }
    toast(r.ok ? "Changes requested" : (r.message || "Failed"), r.ok ? "ok" : "err");
    panel.classList.remove("show");
  } catch (e) { toast(e.message, "err"); }
});

// ═══ Files tab ═══
async function renderFiles() {
  try {
    const r = await apiGet("/api/workspace");
    if (r.missionId) state.missionId = r.missionId;
    const tree = r.tree;
    if (!tree) { $("files-tree").innerHTML = '<div class="empty">No mission</div>'; return; }
    const count = countFileNodes(tree);
    $("files-count").textContent = count;
    $("files-tree").innerHTML = "";
    renderFileTreeNodes(tree.children || [], 0, $("files-tree"));
    attachFileTreeListeners();
  } catch (e) { $("files-tree").innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`; }
}

function countFileNodes(node) {
  if (node.type === "file") return 1;
  return (node.children || []).reduce((n, c) => n + countFileNodes(c), 0);
}

function renderFileTreeNodes(nodes, depth, parent) {
  for (const node of nodes) {
    const row = document.createElement("div");
    row.className = "f-tree-row";
    row.dataset.path = node.path;
    row.dataset.type = node.type;
    const icon = node.type === "dir" ? "📁" : "📄";
    const isReadOnly = isReadOnlyFile(node.name);
    row.innerHTML = `<span class="f-tree-icon ${node.type}">${icon}</span><span class="f-tree-name">${escapeHtml(node.name)}</span>${isReadOnly ? '<span class="f-tree-lock" title="read-only">🔒</span>' : ""}`;
    parent.appendChild(row);
    if (node.children) renderFileTreeNodes(node.children, depth + 1, parent);
  }
}

function isReadOnlyFile(name) {
  // System/state files are read-only in the Files tab
  const readOnly = ["events.jsonl", "usage.jsonl", "budget.json", "approval.json", "state.json", "current-mission.json"];
  if (readOnly.includes(name)) return true;
  if (name.startsWith("validation-reports/") || name.startsWith("validation-receipts/")) return true;
  if (name.startsWith("handoffs/") || name.startsWith("worker-runs/")) return true;
  if (name.startsWith("jobs/")) return true;
  if (name.endsWith(".raw.txt")) return true;
  return false;
}

function attachFileTreeListeners() {
  document.querySelectorAll(".f-tree-row").forEach((row) => {
    row.addEventListener("click", async () => {
      document.querySelectorAll(".f-tree-row.selected").forEach((r) => r.classList.remove("selected"));
      row.classList.add("selected");
      if (row.dataset.type === "file") {
        try {
          const r = await fetch(`/api/file?path=${encodeURIComponent(row.dataset.path)}${state.missionId ? `&missionId=${encodeURIComponent(state.missionId)}` : ""}`);
          const data = await r.json();
          if (data.content !== undefined) openFileInEditor(row.dataset.path, data.content);
        } catch (e) { toast(e.message, "err"); }
      }
    });
  });
}

function openFileInEditor(path, content) {
  state.currentFile = { path, content, editable: !isReadOnlyFile(path.split("/").pop() || "") };
  $("files-path").textContent = path;
  $("files-lock").textContent = state.currentFile.editable ? "" : "🔒 read-only";
  $("files-editor-body").innerHTML = `<pre>${escapeHtml(content)}</pre>`;
  $("btn-edit-file").style.display = state.currentFile.editable ? "" : "none";
  $("btn-edit-file").disabled = false;
  $("btn-save-file").style.display = "none";
  $("btn-cancel-edit").style.display = "none";
  state.editingFile = false;
}

$("btn-edit-file").addEventListener("click", () => {
  if (!state.currentFile.editable) return;
  state.editingFile = true;
  $("files-editor-body").innerHTML = `<textarea id="file-editor">${escapeHtml(state.currentFile.content)}</textarea>`;
  $("btn-edit-file").style.display = "none";
  $("btn-save-file").style.display = "";
  $("btn-cancel-edit").style.display = "";
});

$("btn-save-file").addEventListener("click", async () => {
  const content = $("file-editor").value;
  try {
    const r = await apiPost("/api/file", { path: state.currentFile.path, content });
    if (r.ok) {
      toast("Saved " + state.currentFile.path, "ok");
      state.currentFile.content = content;
      openFileInEditor(state.currentFile.path, content);
    } else {
      toast(r.error || "Save failed", "err");
    }
  } catch (e) { toast(e.message, "err"); }
});

$("btn-cancel-edit").addEventListener("click", () => {
  openFileInEditor(state.currentFile.path, state.currentFile.content);
});

// ═══ Modal ═══
function closeModal() { $("modal-overlay").classList.remove("open"); }
$("modal-close").addEventListener("click", closeModal);
$("modal-overlay").addEventListener("click", (e) => { if (e.target.id === "modal-overlay") closeModal(); });

// ═══ Init ═══
document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => setTab(t.dataset.tab)));
setTab("live");

// Poll: live every 2s, status every 5s
setInterval(() => { if (state.activeTab === "live") renderLive(); }, 2000);
</script>
